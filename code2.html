<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>code</title>
    </head>
    <style>
        #div1{
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        #div2{
            margin-top: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: row;
            gap: 5px;
        }
        #div3{
            margin-top: 0px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0px;
            flex-direction: column;
            
            
        }
      
        #addBtn{
            width: 70px;
            height: 35px;
            background-color: rgb(48, 109, 241);
        }

        body{
            background-color:rgb(160, 160, 160);
            overflow: hidden;
        }
        #ansT{
            
            color: rgb(200, 255, 0); 

        }
        #sen{
            margin-top: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: row;
            gap: 5px;
        }
        

    </style>

    <body id="body">
        <audio id="successSound" src="code2.m4a"></audio>

        <div id="div1">Enter the code:</div>
        <div id="div2">
            <input id="inpt1">
        </div>
        <div id="div2">
            <button id="addBtn">Enter</button>
        </div>
        <div id="div3">
            <h1 id="ansT"></h1>
            <div id="sen"></div>
        </div>



    <script>
        let successSound = document.getElementById("successSound");

        let inpt1 = 
        document.getElementById("inpt1");
        let addBtn = 
        document.getElementById("addBtn");
        let ansT = 
        document.getElementById("ansT");
        let sen =
        document.getElementById("sen");
        
        addBtn.onclick = function(){
            let ans = 
            String(inpt1.value)
            if (ans === "آلفا"){
                ansT.textContent = "The code is correct";
                ansT.style.color = "green";
                successSound.currentTime = 0; // اگر دوباره کلیک شد از اول پخش شود
                successSound.play();
                sen.textContent = "تبریک می‌گوییم! تیم عملیاتی شما با کشف رمز، متوجه توطئه‌ای بزرگ شده است. بررسی‌ها نشان می‌دهد یک تیم تروریستی اسرائیلی در ماه‌های گذشته انستیتو پاستور را زیر نظر داشته و حملات اخیر نیز در همین راستا انجام شده است. پس از گفت‌وگو با دکتر تهمینه جلالی، مسئول واحد آربوویروس‌ها و تب‌های خونریزی‌دهنده، مشخص شد که پژوهشگران این مجموعه سال‌ها روی توسعه پادتنی برای مقابله با سلاح‌های بیولوژیکی مبتنی بر ویروس‌های تب‌های خونریزی‌دهنده کار کرده‌اند. دکتر امیر قائمی اعلام کرده است که این پروژه استراتژیک در روزهای آغازین جنگ به یکی از آزمایشگاه‌های وزارت دفاع منتقل شده و آسیبی ندیده است. در ادامه تحقیقات مشخص شد که آزمایشگاه نگهداری اطلاعات این پروژه توسط یک سامانه امنیتی پیشرفته محافظت می‌شود. این سامانه توسط علی احسانیان، دانشمند ایرانی که در تاریخ ۸ فروردین توسط موساد ترور شد، طراحی شده است و تاکنون کسی موفق به عبور از آن نشده است. اکنون شما باید راه ورود به این آزمایشگاه را پیدا کنید. موفق باشید.";
            }
            else{
                ansT.textContent = "The code is wrong";
                ansT.style.color = "red";
                sen.textContent = "a";
            }

        }

</script>


</body>

</html>
